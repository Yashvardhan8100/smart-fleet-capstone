<!-- ✅ SHOW DASHBOARD SHELL ONLY FOR LOGGED-IN USERS -->
<ng-container *ngIf="authService.isLoggedIn(); else publicLayout">

  <div class="app-shell">

    <!-- ✅ SIDEBAR -->
    <aside class="sidebar">
      <div class="brand-box">
        <div class="brand-icon">🚚</div>
        <div>
          <h2>SmartFleet Pro</h2>
          <p>Command Every Mile</p>
        </div>
      </div>

      <nav class="nav-menu">

        <a routerLink="/dashboard" routerLinkActive="active">
          <span>📊</span> Dashboard
        </a>

        <a routerLink="/vehicles" routerLinkActive="active"
           *ngIf="role === 'ADMIN' || role === 'FLEET_MANAGER'">
          <span>🚚</span> Vehicles
        </a>

        <a routerLink="/drivers" routerLinkActive="active"
           *ngIf="role === 'ADMIN' || role === 'FLEET_MANAGER'">
          <span>👤</span> Drivers
        </a>

        <a routerLink="/maintenance" routerLinkActive="active"
           *ngIf="role === 'ADMIN' || role === 'MECHANIC'">
          <span>⚙️</span> Maintenance
        </a>

        <a routerLink="/insurance" routerLinkActive="active"
           *ngIf="role === 'ADMIN'">
          <span>🛡️</span> Insurance
        </a>

      </nav>

      <div class="sidebar-footer">
        <div class="system-status">
          <span class="live-dot"></span> Live Tracking ON
        </div>

        <button class="logout-btn" (click)="logout()">
          Logout
        </button>
      </div>
    </aside>

    <!-- ✅ MAIN CONTENT -->
    <main class="main-content">

      <header class="topbar">
        <div>
          <h1>{{ title }}</h1>
          <p>Enterprise Fleet Command Center</p>
        </div>

        <div class="topbar-metrics">
          <span>🚚 2,847 active</span>
          <span>99.98% uptime</span>
          <span>🔐 JWT secured</span>
        </div>
      </header>

      <section class="page-content">
        <router-outlet></router-outlet>
      </section>

    </main>

  </div>

</ng-container>


<!-- ✅ PUBLIC PAGES (Landing + Login + Register) -->
<ng-template #publicLayout>

  <!-- ✅ NO SIDEBAR HERE -->
  <router-outlet></router-outlet>

</ng-template>
