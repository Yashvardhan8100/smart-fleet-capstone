<div class="auth-page">

  <div class="auth-card">

    <div class="top-line"></div>

    <div class="auth-header">
      <h2>🚚 CREATE ACCOUNT</h2>
      <p>Register as Admin</p>
    </div>

    <div class="alert alert-success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="alert alert-danger" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="register()">

      <!-- Username -->
      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          class="form-control"
          placeholder="Username"
          formControlName="username"
        />

        <small
          class="error"
          *ngIf="submitted && registerForm.get('username')?.hasError('required')">
          Please enter username.
        </small>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          class="form-control"
          placeholder="name@example.com"
          formControlName="email"
        />

        <small
          class="error"
          *ngIf="submitted && registerForm.get('email')?.hasError('required')">
          Please enter email.
        </small>

        <small
          class="error"
          *ngIf="submitted && registerForm.get('email')?.hasError('email')">
          Please enter a valid email.
        </small>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          class="form-control"
          placeholder="********"
          formControlName="password"
        />

        <small
          class="error"
          *ngIf="submitted && registerForm.get('password')?.hasError('required')">
          Please enter password.
        </small>
      </div>

      <!-- Contact Number -->
      <div class="form-group">
        <label>Contact Number</label>
        <input
          type="text"
          class="form-control"
          placeholder="Contact Number"
          formControlName="contactNumber"
        />

        <small
          class="error"
          *ngIf="submitted && registerForm.get('contactNumber')?.hasError('pattern')">
          Contact number must be exactly 10 digits.
        </small>
      </div>

      <!-- Role -->
      <div class="form-group">
        <label>Role</label>
        <select class="form-control" formControlName="role">
          <option value="ADMIN">ADMIN</option>
        </select>

        <small
          class="error"
          *ngIf="submitted && registerForm.get('role')?.hasError('required')">
          Please select role.
        </small>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-submit">
        Register
      </button>

    </form>

    <div class="auth-link">
      <a routerLink="/login">Go to Login</a>
    </div>

  </div>

</div>
